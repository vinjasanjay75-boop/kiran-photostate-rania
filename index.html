<!DOCTYPE html>
<html>
<head>
  <title>CSC + Jobs + Tools Portal</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; text-align:center; }

    header {
      background:green;
      color:white;
      padding:15px;
      font-size:20px;
    }

    .card {
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      width:260px;
      vertical-align:top;
    }

    .btn {
      display:inline-block;
      padding:8px;
      margin-top:10px;
      background:green;
      color:white;
      text-decoration:none;
      border-radius:5px;
      cursor:pointer;
    }

    .job-box {
      width:90%;
      margin:auto;
      background:white;
      padding:15px;
      border-radius:10px;
      text-align:left;
    }

    .job {
      border-bottom:1px solid #ddd;
      padding:10px 0;
    }

    .tag {
      font-size:12px;
      background:#eee;
      padding:3px 6px;
      border-radius:5px;
      margin-right:5px;
    }

    input {
      padding:8px;
      margin:5px;
      width:80%;
    }

    canvas {
      margin-top:10px;
      max-width:100%;
    }
  </style>
</head>

<body>

<header>🔥 CSC + Jobs + Tools Portal</header>

<h2>🧾 CSC Services</h2>

<div class="card"><h3>Aadhaar</h3><a class="btn" href="https://uidai.gov.in/" target="_blank">Open</a></div>
<div class="card"><h3>PAN</h3><a class="btn" href="https://www.protean-tinpan.com/" target="_blank">Open</a></div>

<h2>🔥 Latest Jobs</h2>

<input placeholder="Search Jobs..." onkeyup="searchJobs(this.value)">

<div class="job-box" id="jobs">Loading demo jobs...</div>

<h2>🧠 Image Resizer Tool</h2>

<div class="card" style="width:90%;">

  <input type="file" id="imgInput">

  <br>

  <label>Resize %</label>
  <input type="range" id="size" min="10" max="100" value="100">

  <br>

  <label>Quality</label>
  <input type="range" id="quality" min="10" max="100" value="80">

  <br>

  <label>Background</label>
  <input type="color" id="bg" value="#ffffff">

  <br>

  <button class="btn" onclick="processImage()">Convert</button>

  <br>

  <canvas id="canvas"></canvas>

  <br>

  <a class="btn" id="download" download="image.jpg">Download</a>

</div>

<script>

// ---------------- DEMO JOBS (NO ERROR) ----------------
let jobsData = [
  { title:"SSC GD Constable 2026", category:"SSC", lastDate:"25 April 2026", eligibility:"10th Pass", link:"https://ssc.nic.in" },
  { title:"Railway Group D", category:"Railway", lastDate:"30 April 2026", eligibility:"10th Pass", link:"https://indianrailways.gov.in" },
  { title:"Police Vacancy", category:"Police", lastDate:"20 April 2026", eligibility:"12th Pass", link:"#"}
];

function showJobs(data){
  let html = "";
  data.forEach(job=>{
    html += `
      <div class="job">
        <b>${job.title}</b><br>
        <span class="tag">${job.category}</span>
        <span class="tag">${job.lastDate}</span>
        <p>${job.eligibility}</p>
        <a class="btn" href="${job.link}" target="_blank">Apply</a>
      </div>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

function searchJobs(q){
  let f = jobsData.filter(j => j.title.toLowerCase().includes(q.toLowerCase()));
  showJobs(f);
}

showJobs(jobsData);

// ---------------- IMAGE TOOL SAFE ----------------
function processImage(){

  let file = document.getElementById("imgInput").files[0];
  if(!file){
    alert("Please image select karo");
    return;
  }

  let size = document.getElementById("size").value / 100;
  let quality = document.getElementById("quality").value / 100;
  let bg = document.getElementById("bg").value;

  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  let img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = function(){

    canvas.width = img.width * size;
    canvas.height = img.height * size;

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    let url = canvas.toDataURL("image/jpeg", quality);

    document.getElementById("download").href = url;
  }
}
</script>

</body>
</html>
