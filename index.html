<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Govt Jobs + Document Tool - Sanjay Wazirawat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#16a34a;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.nav{
  background:#111827;
  text-align:center;
  padding:8px;
}

.nav a{
  color:white;
  margin:8px;
  text-decoration:none;
  font-size:13px;
}

.section{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:6px;
}

.job{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-left:5px solid #16a34a;
  cursor:pointer;
}

.btn{
  background:#16a34a;
  color:white;
  padding:6px 10px;
  text-decoration:none;
  border-radius:5px;
  display:inline-block;
  margin-top:6px;
  font-size:12px;
}

.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-content{
  background:white;
  width:90%;
  max-width:400px;
  margin:80px auto;
  padding:15px;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

input, select{
  width:95%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

canvas{
  display:none;
}

footer{
  background:#111827;
  color:white;
  text-align:center;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
🔥 Sanjay Wazirawat - Govt Jobs + Real Document Resizer
</header>

<div class="nav">
<a href="#jobs">Jobs</a>
<a href="#doc">Document Tool</a>
</div>

<!-- JOBS -->
<div class="section" id="jobs">
<h2>📢 Latest Jobs</h2>

<div class="job" onclick="openJob('SSC Selection Post','10th/12th/Graduate','04-05-2026','https://ssc.nic.in/')">
SSC Selection Post Phase 14
</div>

<div class="job" onclick="openJob('Railway Group D','10th Pass','25-05-2026','https://indianrailways.gov.in/')">
Railway Group D Vacancy
</div>

<div class="job" onclick="openJob('SBI Bank Officer','Graduate','04-05-2026','https://sbi.co.in/')">
SBI Bank Officer
</div>

</div>

<!-- DOCUMENT TOOL -->
<div class="section" id="doc">
<h2>📄 REAL Image Compressor (KB Control)</h2>

<input type="file" id="file" accept="image/*">

<select id="quality">
<option value="0.9">High (near original)</option>
<option value="0.7">Medium</option>
<option value="0.5">Low</option>
<option value="0.3">Very Low</option>
</select>

<button class="btn" onclick="compressImage()">Compress Image</button>

<p id="status"></p>
<a id="download" class="btn" style="display:none">Download Image</a>

<canvas id="canvas"></canvas>
<img id="preview" style="max-width:100%;margin-top:10px;">
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<span class="close" onclick="closeJob()">×</span>

<h3 id="title"></h3>
<p id="qual"></p>
<p id="date"></p>

<a id="apply" class="btn" target="_blank">Apply Now</a>

</div>
</div>

<script>

/* JOB POPUP */
function openJob(t,q,d,l){
document.getElementById("popup").style.display="block";
document.getElementById("title").innerText=t;
document.getElementById("qual").innerText="Qualification: "+q;
document.getElementById("date").innerText="Last Date: "+d;
document.getElementById("apply").href=l;
}

function closeJob(){
document.getElementById("popup").style.display="none";
}

/* REAL IMAGE COMPRESSION */
function compressImage(){

let file=document.getElementById("file").files[0];
let quality=parseFloat(document.getElementById("quality").value);

if(!file){
alert("Select image first");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();
img.src=e.target.result;

img.onload=function(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let compressed=canvas.toDataURL("image/jpeg",quality);

document.getElementById("preview").src=compressed;

let link=document.getElementById("download");
link.href=compressed;
link.download="compressed.jpg";
link.style.display="inline-block";

document.getElementById("status").innerHTML="✔ Image compressed successfully";
};
};

reader.readAsDataURL(file);
}

</script>

<footer>
© 2026 Sanjay Wazirawat | Govt Jobs Portal
</footer>

</body>
</html>
