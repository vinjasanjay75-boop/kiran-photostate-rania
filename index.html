<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>India Smart CSC + Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

header{
  background:linear-gradient(90deg,#16a34a,#22c55e);
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

input{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:12px;
  display:inline-block;
  width:260px;
  vertical-align:top;
  text-align:left;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:8px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.tag{
  font-size:12px;
  background:#334155;
  padding:4px 6px;
  border-radius:6px;
  margin-right:5px;
  display:inline-block;
}

.section{
  width:90%;
  margin:auto;
}

footer{
  margin-top:20px;
  padding:10px;
  background:#0b1220;
}
</style>
</head>

<body>

<header>🔥 India Smart CSC + Job Portal</header>

<input id="search" placeholder="Search Jobs..." onkeyup="searchJobs()">

<h2>🧾 CSC Services</h2>

<div class="card">
<h3>Aadhaar</h3>
<a class="btn" href="https://uidai.gov.in/" target="_blank">Open</a>
</div>

<div class="card">
<h3>PAN Card</h3>
<a class="btn" href="https://www.protean-tinpan.com/" target="_blank">Open</a>
</div>

<div class="card">
<h3>Parivahan (DL)</h3>
<a class="btn" href="https://parivahan.gov.in/" target="_blank">Open</a>
</div>

<h2>🔥 Latest Jobs</h2>

<div id="jobs" class="section"></div>

<h2>📄 Document Guide</h2>

<div class="card">
✔ Photo: 20KB - 50KB<br>
✔ Signature: 10KB - 20KB<br>
✔ Form: 200KB - 2MB<br>
✔ PDF: 100KB - 1MB
</div>

<div class="card">
<h3>Official Links</h3>
<a class="btn" href="https://voters.eci.gov.in/" target="_blank">Voter ID</a><br>
<a class="btn" href="https://parivahan.gov.in/" target="_blank">Driving License</a>
</div>

<footer>
© CSC & Job Portal | India
</footer>

<script>

// SAFE DEMO JOB DATA (NO ERROR)
let jobs = [
{title:"SSC GD Constable 2026",cat:"SSC",date:"25 Apr 2026"},
{title:"Railway Group D Vacancy",cat:"Railway",date:"30 Apr 2026"},
{title:"Police Bharti 2026",cat:"Police",date:"20 Apr 2026"},
{title:"Bank Clerk Recruitment",cat:"Bank",date:"10 May 2026"},
{title:"Army Rally Bharti",cat:"Army",date:"15 May 2026"}
];

function show(data){
let html="";
data.forEach(j=>{
html+=`
<div class="card">
<h3>${j.title}</h3>
<span class="tag">${j.cat}</span>
<span class="tag">${j.date}</span>
<p>Apply on official government website only.</p>
<a class="btn" href="https://www.google.com/search?q=${j.title}" target="_blank">View Details</a>
</div>
`;
});
document.getElementById("jobs").innerHTML=html;
}

function searchJobs(){
let q=document.getElementById("search").value.toLowerCase();
let f=jobs.filter(j=>j.title.toLowerCase().includes(q));
show(f);
}

show(jobs);

</script>

</body>
</html>
