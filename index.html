<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Jobs Portal</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#16a34a;color:white;text-align:center;padding:15px;}
.job{background:white;margin:10px;padding:10px;border-left:5px solid green;}
a{background:green;color:white;padding:5px;text-decoration:none;border-radius:5px;}
</style>
</head>

<body>

<header>🔥 LIVE Govt Jobs Portal</header>

<div id="jobs"></div>

<script>

fetch("jobs.json")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(job=>{
html+=`
<div class="job">
<h3>${job.title}</h3>
<p>${job.qualification}</p>
<p>Last Date: ${job.lastDate}</p>
<a href="${job.link}" target="_blank">Apply</a>
</div>
`;
});

document.getElementById("jobs").innerHTML=html;

});

</script>

</body>
</html>
